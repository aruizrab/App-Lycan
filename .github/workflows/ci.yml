name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    name: Lint, Test & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Validate Commit Messages
        if: github.event_name == 'pull_request'
        run: |
          # Lint only commits on the PR branch that are not already on the base branch.
          # Using git log with --no-walk on each SHA avoids the merge-commit ancestry issue
          # where --from/--to walks both sides of the history.
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}
          BASE=$(git merge-base origin/${{ github.base_ref }} ${{ github.event.pull_request.head.sha }})
          echo "Linting commits from $BASE to ${{ github.event.pull_request.head.sha }}"
          npx commitlint --from "$BASE" --to ${{ github.event.pull_request.head.sha }} --verbose

  release:
    name: Semantic Release
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # Release only runs on direct pushes to master (i.e. when develop is merged into master)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
